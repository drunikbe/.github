name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve before proposing a specific solution — it helps us understand whether the right fix is the one you have in mind or something else entirely.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's getting in the way today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Sketches, API shapes, and examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why you ruled them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues.
