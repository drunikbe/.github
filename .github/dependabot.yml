# Dependabot config for the drunikbe/.github org repo itself.
# Canonical template lives at templates/dependabot.yml.

version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Brussels'
    groups:
      actions:
        patterns: ['*']
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(deps)'
