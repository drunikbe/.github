name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the details below — the more context you give, the faster we can help.

        For security vulnerabilities, do **not** open a public issue. See [SECURITY.md](https://github.com/drunikbe/.github/blob/main/.github/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug. A small repo or gist is ideal.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, stack traces, or screenshots where relevant.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: The release tag, version number, or commit SHA you're running.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, browser, device — whatever is relevant to this project.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, related issues, workarounds you've tried.
