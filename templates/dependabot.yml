# DRUNIK BV — canonical Dependabot configuration.
# Copy this file to .github/dependabot.yml in any repo and uncomment the
# ecosystems that apply. Keep schedule, labels, and commit-message prefix
# consistent across repos so PRs look the same everywhere.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ------------------------------------------------------------------
  # GitHub Actions — applies to any repo with workflows in .github/
  # ------------------------------------------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Brussels'
    groups:
      actions:
        patterns: ['*']
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(deps)'

  # ------------------------------------------------------------------
  # npm — uncomment for JS/TS repos (descent-app, helldivers.bot, ...)
